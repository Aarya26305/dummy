<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Forecast App</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🌦 Weather Forecast App</h1>

    <form method="POST">

        <input type="text"
               name="city"
               placeholder="Enter city name"
               required>

        <button type="submit">
            Get Weather
        </button>

    </form>

    {% if error %}

    <div class="error-box">
        {{ error }}
    </div>

    {% endif %}

    {% if weather %}

    <div class="weather-card">

        <h2>
            {{ weather.city }},
            {{ weather.country }}
        </h2>

        <h1>
            {{ weather.temperature }}°C
        </h1>

        <p>
            🌥 {{ weather.description }}
        </p>

        <p>
            💧 Humidity:
            {{ weather.humidity }}%
        </p>

        <p>
            💨 Wind Speed:
            {{ weather.wind }} kph
        </p>

    </div>

    {% endif %}

</div>

</body>
</html>
